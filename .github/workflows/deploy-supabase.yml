name: Deploy Supabase Functions

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
      - feat/harden-stats-queues-and-pin

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: supabase
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN || secrets.SUPABASE_PAT }}
      PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        run: |
          curl -L -o supabase.tar.gz "https://github.com/supabase/cli/releases/download/v2.58.5/supabase_linux_amd64.tar.gz"
          tar -xzf supabase.tar.gz
          rm supabase.tar.gz
          echo "$(pwd)" >> $GITHUB_PATH

      - name: Verify CLI
        run: |
          ./supabase --version

      - name: Validate deployment configuration
        run: |
          if [[ -z "$SUPABASE_ACCESS_TOKEN" ]]; then
            echo "SUPABASE_ACCESS_TOKEN (or SUPABASE_PAT) is required."
            exit 1
          fi

          if [[ -z "$PROJECT_REF" ]]; then
            echo "SUPABASE_PROJECT_REF is required."
            exit 1
          fi

      - name: Deploy all edge functions in repository
        run: |
          set -euo pipefail
          mapfile -t functions < <(find functions -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | grep -v '^_')

          if [[ ${#functions[@]} -eq 0 ]]; then
            echo "No deployable functions found under supabase/functions"
            exit 1
          fi

          printf 'Found %s functions to deploy\n' "${#functions[@]}"
          for fn in "${functions[@]}"; do
            echo "Deploying $fn"
            ./supabase functions deploy "$fn" \
              --project-ref "$PROJECT_REF" \
              --no-verify-jwt
          done

      - name: Verify deployed functions (list)
        run: |
          echo "Listing functions in project: $PROJECT_REF"
          ./supabase functions list --project-ref "$PROJECT_REF"
