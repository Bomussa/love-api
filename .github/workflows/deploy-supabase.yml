name: Deploy Supabase Functions

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
      - feat/harden-stats-queues-and-pin

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: supabase
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN || secrets.SUPABASE_PAT }}
      PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        run: |
          curl -L -o supabase.tar.gz "https://github.com/supabase/cli/releases/download/v2.58.5/supabase_linux_amd64.tar.gz"
          tar -xzf supabase.tar.gz
          rm supabase.tar.gz
          echo "$(pwd)" >> $GITHUB_PATH

      - name: Verify CLI
        run: |
          ./supabase --version

      - name: Validate deployment secrets
        run: |
          if [[ -z "${SUPABASE_ACCESS_TOKEN}" ]]; then
            echo "Missing SUPABASE_ACCESS_TOKEN (or SUPABASE_PAT) secret."
            exit 1
          fi

          if [[ ! "${SUPABASE_ACCESS_TOKEN}" =~ ^sbp_[A-Za-z0-9]+$ ]]; then
            echo "Invalid SUPABASE_ACCESS_TOKEN format. Expected Personal Access Token like sbp_..."
            exit 1
          fi

          if [[ -z "${PROJECT_REF}" ]]; then
            echo "Missing SUPABASE_PROJECT_REF secret."
            exit 1
          fi

          if [[ ! "${PROJECT_REF}" =~ ^[a-z0-9]{20}$ ]]; then
            echo "Invalid SUPABASE_PROJECT_REF format. Expected 20 lowercase alphanumeric characters."
            exit 1
          fi

      - name: Deploy api-router
        run: |
          ./supabase functions deploy api-router \
            --project-ref "$PROJECT_REF" \
            --no-verify-jwt

      - name: Deploy events-stream
        run: |
          ./supabase functions deploy events-stream \
            --project-ref "$PROJECT_REF" \
            --no-verify-jwt

      - name: Deploy call-next-patient
        run: |
          ./supabase functions deploy call-next-patient \
            --project-ref "$PROJECT_REF" \
            --no-verify-jwt

      - name: Deploy issue-pin
        run: |
          ./supabase functions deploy issue-pin \
            --project-ref "$PROJECT_REF" \
            --no-verify-jwt
            
      - name: Deploy patient-login
        run: |
          ./supabase functions deploy patient-login \
            --project-ref "$PROJECT_REF" \
            --no-verify-jwt

      - name: Deploy queue-enter
        run: |
          ./supabase functions deploy queue-enter \
            --project-ref "$PROJECT_REF" \
            --no-verify-jwt

      - name: Deploy queue-status
        run: |
          ./supabase functions deploy queue-status \
            --project-ref "$PROJECT_REF" \
            --no-verify-jwt

      - name: Deploy pin-status
        run: |
          ./supabase functions deploy pin-status \
            --project-ref "$PROJECT_REF" \
            --no-verify-jwt

      - name: Deploy api-v1-status
        run: |
          ./supabase functions deploy api-v1-status \
            --project-ref "$PROJECT_REF" \
            --no-verify-jwt
            
      - name: Deploy db-check
        run: |
          ./supabase functions deploy db-check \
            --project-ref "$PROJECT_REF" \
            --no-verify-jwt

      - name: Verify deployed functions (list)
        run: |
          echo "Listing functions in project: $PROJECT_REF"
          ./supabase functions list --project-ref "$PROJECT_REF"
