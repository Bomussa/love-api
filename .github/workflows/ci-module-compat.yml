name: Module Compatibility

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  module-compat:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check module style
        run: npm run check:module-style

      - name: Run import smoke test
        run: npm run test:imports
