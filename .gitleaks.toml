title = "love-api secret scanning policy"

[extend]
useDefault = true

[[rules]]
id = "generic-high-entropy-api-key"
description = "Generic high entropy key assignment"
regex = '''(?i)(api[_-]?key|token|secret|password|pat|jwt|private[_-]?key)\s*[:=]\s*["']?[A-Za-z0-9_\-\+/=]{20,}["']?'''
entropy = 3.5
keywords = ["api_key", "token", "secret", "password", "pat", "jwt", "private_key"]
